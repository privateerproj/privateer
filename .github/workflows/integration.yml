---
name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # On push to main, always run
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            # On PR, check if any non-markdown files changed
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -v '\.md$' || true)
            if [ -z "$FILES" ]; then
              echo "code=false" >> "$GITHUB_OUTPUT"
            else
              echo "code=true" >> "$GITHUB_OUTPUT"
            fi
          fi

  integration:
    name: Integration Tests
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build
        run: make -B build

      - name: ossf/pvtr-github-repo-scanner Plugin Integration Test
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          ./test/integration_test.sh 2>&1 | tee integration_output.txt

      - name: Verify integration test output
        if: always()
        run: |
          echo "=== Integration test output ==="
          cat integration_output.txt
          echo "=== Verifying expected summary line ==="
          grep -E 'privateer_osps-baseline-.*Passed.*Warnings.*Failed.*Possible' integration_output.txt || {
            echo "ERROR: Expected summary line not found in integration test output"
            exit 1
          }
