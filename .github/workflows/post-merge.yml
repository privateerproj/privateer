name: Post merge to main

on:
  push:
    branches: [main]

jobs:
  first_test_job:
    name: Find extra commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: Fetch_tags
        run: git fetch --prune --unshallow --tags
      - run: git describe --tags
      - id: set_output_tags
        run: |
          echo "extra_commits=$(git describe --tags)" >> "$GITHUB_OUTPUT"
      - name: Set Badge
        uses: RubbaBoy/BYOB@24f464284c1fd32028524b59607d417a2e36fee7 # v1.3.0
        with:
          name: Version
          label: "Version"
          status: ${{ steps.set_output_tags.outputs.extra_commits }}
          color: CFC03A
          github_token: ${{ secrets.GITHUB_TOKEN }}
