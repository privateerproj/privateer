      - reference-id: PCIDSS
        entries:
          - reference-id: 2.2.1
          - reference-id: 2.2.3
          - reference-id: 2.2.4
          - reference-id: 2.2.5
          - reference-id: 2.2.6
          - reference-id: 3.1.1
          - reference-id: 4.1.1
          - reference-id: 5.1.1
          - reference-id: 6.1.1
          - reference-id: 6.2.1
          - reference-id: 7.1.1
          - reference-id: 8.1.1
          - reference-id: 11.1.1
          - reference-id: 12.3.1
          - reference-id: 12.5.3
      - reference-id: 800-161
        entries:
          - reference-id: CM-2
          - reference-id: PL-8
          - reference-id: RA-3
          - reference-id: SA-15          
      - reference-id: UKSSCOP
        entries:
          - reference-id: Claim 1.1.5
    assessment-requirements:
      - id: OSPS-SA-01.01
        text: |
          When the project has made a release, the project documentation MUST
          include design documentation demonstrating all actions and actors
          within the system.
        applicability:
          - maturity-2
          - maturity-3
        recommendation: |
          Include designs in the project documentation that explains the actions
          and actors. Actors include any subsystem or entity that can influence
          another segment in the system.
          Ensure this is updated for new features or breaking changes.

  - id: OSPS-SA-02
    title: |
      Publish External Interface Descriptions
    objective: |
      Provide users and developers with an understanding of how to interact with
      the project's software and integrate it with other systems, enabling them
      to use the software effectively.
    group: SA
    guidelines:
      - reference-id: BPB
        entries:
          - reference-id: B-B-10
          - reference-id: B-S-7
      - reference-id: CRA
        entries:
          - reference-id: 1.2a
          - reference-id: 1.2b
      - reference-id: SSDF
        entries:
